<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro de Frases Positivas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="fondo-frases"></div>

    <div class="contenedor-centrado">
        <main class="tarjeta-mensaje">
            <h1>Deja un mensaje bonito</h1>
            
            <form id="formulario-mensaje">
                <input type="text" id="entrada-mensaje" placeholder="Escribe algo que alegre el día..." maxlength="100" required>
                <button type="submit">Compartir</button>
            </form>
            
            <p id="mensaje-error" class="error oculto">El mensaje debe ser positivo. Intenta con palabras más amables.</p>
        </main>
    </div>

    <button id="btn-abrir-formulario" class="btn-abrir oculto">Agregar Frase</button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>

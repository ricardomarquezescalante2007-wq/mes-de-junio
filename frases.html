<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro de Frases Positivas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Contenedor del fondo donde aparecerán las frases en tiempo real -->
    <div id="fondo-frases" class="fondo-frases"></div>

    <!-- Interfaz de usuario fija al frente -->
    <main class="contenedor-principal">
        <h1>Deja un mensaje bonito</h1>
        <!--emogis-->
        <form id="formulario-mensaje">
            <div class="input-con-emojis">
                <input type="text" id="entrada-mensaje" placeholder="Escribe algo que alegre el día a alguien..." maxlength="100" required>
            <button type="submit">Compartir</button>

        </form>
        <p id="mensaje-error" class="error oculto">El mensaje debe ser positivo. Intenta con palabras más amables.</p>
    </main>

    <!-- Scripts de Firebase (Versión CDN simplificada para producción) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- Tu lógica de la aplicación -->
    <script src="app.js"></script>
</body>
</html>
